  <line x1="256" y1="294" x2="256" y2="322" stroke="#c4a35a" stroke-width="1" opacity="0.3"/>
  <line x1="190" y1="256" x2="218" y2="256" stroke="#c4a35a" stroke-width="1" opacity="0.3"/>
